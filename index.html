<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System - Interactive 3D Simulation</title>
    <style>
        :root {
            --bg: #000010;
            --panel-bg: rgba(10, 10, 30, 0.85);
            --text: #c8d6f8;
            --accent: #7aa2f7;
            --gold: #e0b870;
            --glow: rgba(120, 160, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: grab;
        }
        body:active {
            cursor: grabbing;
        }
        body.pointer-cursor {
            cursor: pointer;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        canvas {
            display: block;
        }

        /* Top bar */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
        }
        #top-bar>* {
            pointer-events: auto;
        }
        #title {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: #fff;
            text-shadow: 0 0 30px var(--glow), 0 0 60px rgba(120, 160, 255, 0.25);
            background: var(--panel-bg);
            padding: 10px 18px;
            border-radius: 30px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            gap: 9px;
        }
        #title .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #ffb84d;
            box-shadow: 0 0 14px #ffb84d, 0 0 28px #ff8c00;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 14px #ffb84d, 0 0 28px #ff8c00;
            }
            50% {
                box-shadow: 0 0 22px #ffd080, 0 0 44px #ffa500;
            }
        }

        #speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--panel-bg);
            padding: 8px 15px;
            border-radius: 30px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        #speed-control label {
            color: #bcc8e8;
            font-size: 0.8rem;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }
        #speed-slider {
            -webkit-appearance: none;
            width: 90px;
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            cursor: pointer;
        }
        #speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--accent);
            cursor: pointer;
            box-shadow: 0 0 14px var(--glow);
        }
        #speed-value {
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            min-width: 32px;
            text-align: center;
        }

        /* Info panel */
        #info-panel {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: var(--panel-bg);
            padding: 14px 22px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: var(--text);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            pointer-events: auto;
            min-width: 200px;
        }
        #info-panel.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }
        #info-panel .planet-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.04em;
            margin-bottom: 2px;
        }
        #info-panel .planet-detail {
            font-size: 0.78rem;
            color: #a0b4d8;
            letter-spacing: 0.02em;
        }
        #info-panel .planet-fact {
            font-size: 0.7rem;
            color: #8898c0;
            margin-top: 4px;
            font-style: italic;
        }

        /* Hint */
        #hint {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(200, 210, 240, 0.7);
            font-size: 0.75rem;
            letter-spacing: 0.04em;
            pointer-events: none;
            transition: opacity 0.6s;
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #top-bar {
                padding: 10px 12px;
                flex-wrap: wrap;
                gap: 8px;
                justify-content: center;
            }
            #title {
                font-size: 1rem;
                padding: 8px 14px;
            }
            #speed-control {
                padding: 6px 12px;
                gap: 6px;
            }
            #speed-slider {
                width: 60px;
            }
            #info-panel {
                bottom: 16px;
                padding: 10px 16px;
                border-radius: 16px;
            }
            #info-panel .planet-name {
                font-size: 1.1rem;
            }
            #hint {
                bottom: 95px;
                font-size: 0.65rem;
            }
        }
        @media (max-width: 480px) {
            #title {
                font-size: 0.85rem;
                padding: 6px 10px;
                gap: 5px;
            }
            #title .dot {
                width: 6px;
                height: 6px;
            }
            #speed-control label {
                font-size: 0.7rem;
            }
            #speed-slider {
                width: 45px;
            }
            #info-panel {
                bottom: 10px;
                padding: 8px 13px;
                border-radius: 14px;
                min-width: 150px;
            }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="top-bar">
        <div id="title">
            <span class="dot"></span> Solar System
        </div>
        <div id="speed-control">
            <label for="speed-slider">⏱ Speed</label>
            <input type="range" id="speed-slider" min="0" max="300" value="100" step="1">
            <span id="speed-value">1×</span>
        </div>
    </div>

    <div id="info-panel" class="hidden">
        <div class="planet-name"></div>
        <div class="planet-detail"></div>
        <div class="planet-fact"></div>
    </div>
    <div id="hint">🖱 Drag to rotate &bull; Scroll to zoom &bull; Click a planet to focus</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ────────────────────────────────────
        // DOM Elements
        // ────────────────────────────────────
        const container = document.getElementById('canvas-container');
        const infoPanel = document.getElementById('info-panel');
        const planetNameEl = infoPanel.querySelector('.planet-name');
        const planetDetailEl = infoPanel.querySelector('.planet-detail');
        const planetFactEl = infoPanel.querySelector('.planet-fact');
        const hintEl = document.getElementById('hint');
        const speedSlider = document.getElementById('speed-slider');
        const speedValueEl = document.getElementById('speed-value');

        // ────────────────────────────────────
        // Scene, Camera, Renderer
        // ────────────────────────────────────
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.5, 600);
        camera.position.set(18, 28, 38);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        container.appendChild(renderer.domElement);

        // ────────────────────────────────────
        // Post-Processing (Bloom)
        // ────────────────────────────────────
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(container.clientWidth, container.clientHeight),
            1.3, // strength
            0.5, // radius
            0.65 // threshold
        );
        composer.addPass(bloomPass);

        // ────────────────────────────────────
        // OrbitControls
        // ────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 3;
        controls.maxDistance = 140;
        controls.maxPolarAngle = Math.PI * 0.82;
        controls.target.set(0, 0, 0);
        controls.update();
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.15;

        // ────────────────────────────────────
        // Lighting
        // ────────────────────────────────────
        const sunLight = new THREE.PointLight(0xfff8e7, 180, 200, 1.4);
        sunLight.position.set(0, 0, 0);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.3;
        sunLight.shadow.camera.far = 200;
        sunLight.shadow.bias = -0.0001;
        sunLight.shadow.normalBias = 0.02;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0x0a0a20, 0.25);
        scene.add(ambientLight);

        // Subtle fill light from opposite direction
        const fillLight = new THREE.PointLight(0x334466, 15, 100, 2);
        fillLight.position.set(0, 30, -40);
        scene.add(fillLight);

        // ────────────────────────────────────
        // Helper: Create procedural texture via canvas
        // ────────────────────────────────────
        function createCanvasTexture(width, height, drawFn) {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            drawFn(ctx, width, height);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapU = THREE.RepeatWrapping;
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.generateMipmaps = true;
            return texture;
        }

        function seededRandom(seed) {
            let s = seed;
            return function () {
                s = (s * 16807 + 0) % 2147483647;
                return (s - 1) / 2147483646;
            };
        }

        // ────────────────────────────────────
        // Planet Textures (procedural)
        // ────────────────────────────────────
        function drawSunTexture(ctx, w, h) {
            const rand = seededRandom(42);
            // Base gradient
            const grad = ctx.createRadialGradient(w / 2, h / 2, w * 0.05, w / 2, h / 2, w * 0.7);
            grad.addColorStop(0, '#fffbe0');
            grad.addColorStop(0.2, '#ffe08a');
            grad.addColorStop(0.5, '#ffa835');
            grad.addColorStop(0.8, '#e06510');
            grad.addColorStop(1, '#b83000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Sunspots
            for (let i = 0; i < 35; i++) {
                const sx = w * (0.15 + rand() * 0.7);
                const sy = h * (0.15 + rand() * 0.7);
                const sr = w * (0.01 + rand() * 0.05);
                const spotGrad = ctx.createRadialGradient(sx, sy, sr * 0.1, sx, sy, sr);
                spotGrad.addColorStop(0, 'rgba(120,30,0,0.7)');
                spotGrad.addColorStop(0.6, 'rgba(180,60,10,0.3)');
                spotGrad.addColorStop(1, 'rgba(255,150,40,0)');
                ctx.fillStyle = spotGrad;
                ctx.beginPath();
                ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                ctx.fill();
            }
            // Bright granules
            for (let i = 0; i < 80; i++) {
                const gx = w * (0.1 + rand() * 0.8);
                const gy = h * (0.1 + rand() * 0.8);
                const gr = w * (0.005 + rand() * 0.02);
                ctx.fillStyle = `rgba(255,255,220,${0.15 + rand() * 0.35})`;
                ctx.beginPath();
                ctx.arc(gx, gy, gr, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawMercuryTexture(ctx, w, h) {
            const rand = seededRandom(101);
            ctx.fillStyle = '#8a8a8a';
            ctx.fillRect(0, 0, w, h);
            for (let i = 0; i < 200; i++) {
                const cx = w * rand();
                const cy = h * rand();
                const cr = w * (0.01 + rand() * 0.06);
                const shade = 90 + rand() * 60;
                ctx.fillStyle = `rgb(${shade},${shade},${shade})`;
                ctx.beginPath();
                ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                ctx.fill();
            }
            // Craters with rims
            for (let i = 0; i < 40; i++) {
                const cx = w * rand();
                const cy = h * rand();
                const cr = w * (0.02 + rand() * 0.08);
                const rimGrad = ctx.createRadialGradient(cx, cy, cr * 0.7, cx, cy, cr);
                rimGrad.addColorStop(0, '#5a5a5a');
                rimGrad.addColorStop(0.8, '#9a9a9a');
                rimGrad.addColorStop(1, '#b0b0b0');
                ctx.fillStyle = rimGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawVenusTexture(ctx, w, h) {
            const rand = seededRandom(202);
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#e8d5a3');
            grad.addColorStop(0.3, '#dcc894');
            grad.addColorStop(0.5, '#e6d0a0');
            grad.addColorStop(0.7, '#d4b880');
            grad.addColorStop(1, '#e0c890');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            // Swirling clouds
            for (let i = 0; i < 30; i++) {
                const sx = w * rand();
                const sy = h * rand();
                const sw = w * (0.05 + rand() * 0.25);
                const sh = h * (0.02 + rand() * 0.06);
                ctx.fillStyle = `rgba(255,250,235,${0.08 + rand() * 0.2})`;
                ctx.beginPath();
                ctx.ellipse(sx, sy, sw, sh, rand() * Math.PI, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawEarthTexture(ctx, w, h) {
            const rand = seededRandom(303);
            // Ocean
            const oceanGrad = ctx.createRadialGradient(w * 0.3, h * 0.4, w * 0.1, w / 2, h / 2, w * 0.8);
            oceanGrad.addColorStop(0, '#3388cc');
            oceanGrad.addColorStop(0.5, '#2266aa');
            oceanGrad.addColorStop(1, '#114488');
            ctx.fillStyle = oceanGrad;
            ctx.fillRect(0, 0, w, h);

            // Continents (irregular shapes)
            const continents = [
                { cx: 0.25, cy: 0.35, rx: 0.18, ry: 0.22, rot: 0.2, color: '#5a9e3a' },
                { cx: 0.3, cy: 0.3, rx: 0.12, ry: 0.16, rot: -0.3, color: '#6aae4a' },
                { cx: 0.5, cy: 0.4, rx: 0.2, ry: 0.25, rot: 0.5, color: '#4a8e2a' },
                { cx: 0.55, cy: 0.35, rx: 0.15, ry: 0.18, rot: -0.1, color: '#7abe5a' },
                { cx: 0.7, cy: 0.45, rx: 0.14, ry: 0.2, rot: 0.6, color: '#5a9e3a' },
                { cx: 0.35, cy: 0.55, rx: 0.1, ry: 0.12, rot: -0.4, color: '#6aae4a' },
                { cx: 0.6, cy: 0.6, rx: 0.16, ry: 0.14, rot: 0.3, color: '#4a8e2a' },
                { cx: 0.8, cy: 0.3, rx: 0.08, ry: 0.1, rot: -0.2, color: '#5a9e3a' },
                { cx: 0.15, cy: 0.5, rx: 0.09, ry: 0.13, rot: 0.7, color: '#6aae4a' },
                { cx: 0.45, cy: 0.5, rx: 0.11, ry: 0.09, rot: -0.5, color: '#7abe5a' },
            ];
            continents.forEach(c => {
                ctx.save();
                ctx.translate(c.cx * w, c.cy * h);
                ctx.rotate(c.rot);
                ctx.fillStyle = c.color;
                ctx.beginPath();
                ctx.ellipse(0, 0, c.rx * w, c.ry * h, 0, 0, Math.PI * 2);
                ctx.fill();
                // Add some noise on continent edges
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.beginPath();
                ctx.ellipse(0.02 * w, -0.02 * h, c.rx * w * 0.6, c.ry * h * 0.5, 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
            // Clouds
            for (let i = 0; i < 60; i++) {
                const cx = w * rand();
                const cy = h * rand();
                ctx.fillStyle = `rgba(255,255,255,${0.03 + rand() * 0.12})`;
                ctx.beginPath();
                ctx.ellipse(cx, cy, w * (0.02 + rand() * 0.08), h * (0.01 + rand() * 0.03), rand() * Math.PI, 0, Math.PI *
                    2);
                ctx.fill();
            }
            // Ice caps
            ctx.fillStyle = 'rgba(240,245,255,0.6)';
            ctx.fillRect(0, 0, w, h * 0.06);
            ctx.fillRect(0, h * 0.94, w, h * 0.06);
        }

        function drawMarsTexture(ctx, w, h) {
            const rand = seededRandom(404);
            const grad = ctx.createRadialGradient(w * 0.4, h * 0.35, w * 0.05, w / 2, h / 2, w * 0.75);
            grad.addColorStop(0, '#d4855a');
            grad.addColorStop(0.5, '#c05030');
            grad.addColorStop(1, '#8a3020');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            for (let i = 0; i < 80; i++) {
                const cx = w * rand();
                const cy = h * rand();
                const cr = w * (0.015 + rand() * 0.07);
                ctx.fillStyle = `rgba(${180+rand()*60},${40+rand()*40},${15+rand()*25},${0.2+rand()*0.4})`;
                ctx.beginPath();
                ctx.arc(cx, cy, cr, 0, Math.PI * 2);
                ctx.fill();
            }
            // Polar caps
            ctx.fillStyle = 'rgba(240,235,225,0.5)';
            ctx.fillRect(0, 0, w, h * 0.05);
            ctx.fillRect(0, h * 0.95, w, h * 0.05);
        }

        function drawJupiterTexture(ctx, w, h) {
            const rand = seededRandom(505);
            const baseGrad = ctx.createLinearGradient(0, 0, 0, h);
            baseGrad.addColorStop(0, '#d4b896');
            baseGrad.addColorStop(0.15, '#e8d4b8');
            baseGrad.addColorStop(0.3, '#c89860');
            baseGrad.addColorStop(0.45, '#f0dcc0');
            baseGrad.addColorStop(0.55, '#b87840');
            baseGrad.addColorStop(0.7, '#e0c8a0');
            baseGrad.addColorStop(0.85, '#c89058');
            baseGrad.addColorStop(1, '#d4b896');
            ctx.fillStyle = baseGrad;
            ctx.fillRect(0, 0, w, h);
            // Turbulent bands
            for (let i = 0; i < 60; i++) {
                const by = h * (0.05 + rand() * 0.9);
                ctx.fillStyle = `rgba(${180+rand()*75},${100+rand()*80},${40+rand()*50},${0.1+rand()*0.3})`;
                ctx.fillRect(0, by, w, h * (0.008 + rand() * 0.04));
            }
            // Great Red Spot
            const grsX = w * 0.6;
            const grsY = h * 0.45;
            const grsGrad = ctx.createRadialGradient(grsX, grsY, w * 0.01, grsX, grsY, w * 0.12);
            grsGrad.addColorStop(0, '#e87850');
            grsGrad.addColorStop(0.5, '#d06040');
            grsGrad.addColorStop(1, 'rgba(200,120,80,0)');
            ctx.fillStyle = grsGrad;
            ctx.beginPath();
            ctx.ellipse(grsX, grsY, w * 0.1, h * 0.05, 0.05, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawSaturnTexture(ctx, w, h) {
            const rand = seededRandom(606);
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#f0e0c0');
            grad.addColorStop(0.2, '#e8d4a8');
            grad.addColorStop(0.4, '#f5e8d0');
            grad.addColorStop(0.6, '#e0c890');
            grad.addColorStop(0.8, '#ecd8b0');
            grad.addColorStop(1, '#f0e0c0');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            for (let i = 0; i < 40; i++) {
                const by = h * (0.05 + rand() * 0.9);
                ctx.fillStyle = `rgba(${200+rand()*55},${160+rand()*50},${100+rand()*40},${0.06+rand()*0.2})`;
                ctx.fillRect(0, by, w, h * (0.006 + rand() * 0.03));
            }
        }

        function drawUranusTexture(ctx, w, h) {
            const grad = ctx.createRadialGradient(w * 0.45, h * 0.5, w * 0.05, w / 2, h / 2, w * 0.7);
            grad.addColorStop(0, '#c8f0f8');
            grad.addColorStop(0.4, '#90d8e8');
            grad.addColorStop(0.7, '#70c0d8');
            grad.addColorStop(1, '#5098b8');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            // Subtle bands
            for (let i = 0; i < 8; i++) {
                const by = h * (0.1 + i * 0.1);
                ctx.fillStyle = 'rgba(255,255,255,0.04)';
                ctx.fillRect(0, by, w, h * 0.03);
            }
        }

        function drawNeptuneTexture(ctx, w, h) {
            const grad = ctx.createRadialGradient(w * 0.4, h * 0.45, w * 0.05, w / 2, h / 2, w * 0.7);
            grad.addColorStop(0, '#4068e0');
            grad.addColorStop(0.4, '#3048c0');

        function createOrbitLine(radius, color = 0x334466, opacity = 0.3) {
            const segments = 200;
            const points = [];
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                points.push(new THREE.Vector3(Math.cos(angle) * radius, 0, Math.sin(angle) * radius));
            }
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({
                color,
                transparent: true,
                opacity,
                depthWrite: false,
            });
            const line = new THREE.Line(geometry, material);
            return line;
        }

        function createPlanet(name, radius, orbitRadius, texture, color, speed, infoData) {
            const geometry = new THREE.SphereGeometry(radius, 64, 64);
            const material = new THREE.MeshStandardMaterial({
                map: texture || null,
                color: texture ? new THREE.Color(1, 1, 1) : new THREE.Color(color),
                roughness: texture ? 0.8 : 0.7,
                metalness: 0.05,
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.name = name;
            mesh.userData = {
                orbitRadius,
                speed,
                angle: Math.random() * Math.PI * 2,
                info: infoData,
                isPlanet: true,
            };
            // Pivot for orbit
            const pivot = new THREE.Object3D();
            pivot.add(mesh);
            mesh.position.set(orbitRadius, 0, 0);
            scene.add(pivot);
            planets.push({ mesh, pivot, data: mesh.userData });
            allClickableObjects.push(mesh);
            return { mesh, pivot };
        }

        function createMoon(parentPlanet, name, radius, orbitRadius, texture, color, speed, infoData) {
            const geometry = new THREE.SphereGeometry(radius, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                map: texture || null,
                color: texture ? new THREE.Color(1, 1, 1) : new THREE.Color(color),
                roughness: 0.85,

            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.name = name;
            mesh.userData = {
                orbitRadius,
                speed,
                angle: Math.random() * Math.PI * 2,
                info: infoData,
                isMoon: true,
                parentPlanet: parentPlanet,
            };
            const moonPivot = new THREE.Object3D();
            moonPivot.add(mesh);
            mesh.position.set(orbitRadius, 0, 0);

            allClickableObjects.push(mesh);

        // ────────────────────────────────────
        // Saturn's Rings
        // ────────────────────────────────────
        function createSaturnRings() {
            const ringCanvas = document.createElement('canvas');
            ringCanvas.width = 512;
            ringCanvas.height = 64;
            const rctx = ringCanvas.getContext('2d');
            const ringGrad = rctx.createLinearGradient(0, 0, 512, 0);
            ringGrad.addColorStop(0, 'rgba(180,160,130,0.0)');
            ringGrad.addColorStop(0.08, 'rgba(210,190,150,0.55)');
            ringGrad.addColorStop(0.15, 'rgba(230,210,170,0.8)');
            ringGrad.addColorStop(0.22, 'rgba(240,220,180,0.9)');
            ringGrad.addColorStop(0.28, 'rgba(200,180,140,0.5)');
            ringGrad.addColorStop(0.34, 'rgba(160,140,100,0.15)');
            ringGrad.addColorStop(0.38, 'rgba(220,200,160,0.7)');
            ringGrad.addColorStop(0.48, 'rgba(240,220,185,0.85)');
            ringGrad.addColorStop(0.56, 'rgba(210,185,145,0.6)');
            ringGrad.addColorStop(0.62, 'rgba(170,150,110,0.2)');
            ringGrad.addColorStop(0.68, 'rgba(200,175,140,0.55)');
            ringGrad.addColorStop(0.78, 'rgba(225,200,165,0.7)');
            ringGrad.addColorStop(0.88, 'rgba(180,155,120,0.3)');
            ringGrad.addColorStop(0.95, 'rgba(140,120,90,0.08)');
            ringGrad.addColorStop(1, 'rgba(0,0,0,0)');
            rctx.fillStyle = ringGrad;
            rctx.fillRect(0, 0, 512, 64);
            const ringTexture = new THREE.CanvasTexture(ringCanvas);
            ringTexture.wrapS = THREE.RepeatWrapping;
            ringTexture.colorSpace = THREE.SRGBColorSpace;

            const ringGeometry = new THREE.RingGeometry(4.0, 6.2, 128);
            // Modify UVs for radial texture
            const pos = ringGeometry.attributes.position;
            const uv = ringGeometry.attributes.uv;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const y = pos.getY(i);
                const dist = Math.sqrt(x * x + y * y);
                uv.setXY(i, (dist - 4.0) / (6.2 - 4.0), 0.5);
            }
            const ringMaterial = new THREE.MeshStandardMaterial({
                map: ringTexture,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.85,
                roughness: 0.6,
                metalness: 0.1,
                depthWrite: true,
            });
            const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
            ringMesh.rotation.x = Math.PI * 0.44;
            ringMesh.name = 'Saturn Rings';
            saturnData.mesh.add(ringMesh);
            return ringMesh;
        }
        createSaturnRings();

        // ────────────────────────────────────

        // ────────────────────────────────────
        // Raycaster for click interaction

        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 0.5;
        const mouse = new THREE.Vector2();
        let hoveredObject = null;
        let selectedObject = null;
        let focusTarget = null;
        let focusTransition = 0;

        function updateMouse(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function getIntersections() {
            raycaster.setFromCamera(mouse, camera);
            return raycaster.intersectObjects(allClickableObjects, false);
        }

        // ────────────────────────────────────
        // UI Update
        // ────────────────────────────────────
        function updateInfoPanel(obj) {
            if (!obj || !obj.userData || !obj.userData.info) {
                infoPanel.classList.add('hidden');
                return;
            }
            const info = obj.userData.info;
            planetNameEl.textContent = obj.name;
            planetDetailEl.textContent = info.type + ' • ' + info.detail;
            planetFactEl.textContent = '💫 ' + info.fact;
            infoPanel.classList.remove('hidden');
            hintEl.style.opacity = '0';
        }

        function clearInfoPanel() {
            infoPanel.classList.add('hidden');
            hintEl.style.opacity = '1';
            selectedObject = null;
            focusTarget = null;
        }

        // ────────────────────────────────────
        // Event Listeners
        // ────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
            composer.setSize(container.clientWidth, container.clientHeight);
        });

        window.addEventListener('mousemove', (event) => {
            updateMouse(event);
            const intersections = getIntersections();
            if (intersections.length > 0) {
                const obj = intersections[0].object;
                if (obj.userData && (obj.userData.isPlanet || obj.userData.isMoon)) {
                    if (hoveredObject !== obj) {
                        hoveredObject = obj;
                        document.body.classList.add('pointer-cursor');
                        updateInfoPanel(obj);
                    }
                } else {
                    if (hoveredObject) {
                        hoveredObject = null;
                        document.body.classList.remove('pointer-cursor');
                        if (!selectedObject) clearInfoPanel();
                    }
                }
            } else {
                if (hoveredObject) {
                    hoveredObject = null;
                    document.body.classList.remove('pointer-cursor');
                    if (!selectedObject) clearInfoPanel();
                }
            }
        });

        window.addEventListener('click', (event) => {
            updateMouse(event);
            const intersections = getIntersections();
            if (intersections.length > 0) {
                const obj = intersections[0].object;
                if (obj.userData && (obj.userData.isPlanet || obj.userData.isMoon)) {
                    selectedObject = obj;
                    focusTarget = obj;
                    focusTransition = 0;
                    updateInfoPanel(obj);
                    controls.autoRotate = false;
                    hintEl.style.opacity = '0';
                }
            } else {
                if (selectedObject) {
                    clearInfoPanel();
                    controls.autoRotate = true;
                    focusTarget = null;
                }
            }
        });

        // Touch support
        window.addEventListener('touchstart', (event) => {
            if (event.touches.length === 1) {
                const touch = event.touches[0];
                updateMouse({ clientX: touch.clientX, clientY: touch.clientY });
                const intersections = getIntersections();
                if (intersections.length > 0) {
                    const obj = intersections[0].object;
                    if (obj.userData && (obj.userData.isPlanet || obj.userData.isMoon)) {
                        selectedObject = obj;
                        focusTarget = obj;
                        focusTransition = 0;
                        updateInfoPanel(obj);
                        controls.autoRotate = false;
                        hintEl.style.opacity = '0';
                    }
                }
            }
        });

        // Keyboard controls
        window.addEventListener('keydown', (event) => {
            switch (event.key.toLowerCase()) {
                case 'r':
                    // Reset view
                    focusTarget = null;
                    selectedObject = null;
                    controls.target.set(0, 0, 0);
                    controls.autoRotate = true;
                    clearInfoPanel();
                    break;
                case 'f':
                    // Focus on selected or first planet
                    if (selectedObject && focusTarget === selectedObject) {
                        focusTarget = selectedObject;
                        focusTransition = 0;
                    }
                    break;
                case 'escape':
                    clearInfoPanel();
                    controls.autoRotate = true;
                    focusTarget = null;
                    break;
                case '0':
                    focusTarget = sun;
                    selectedObject = sun;
                    focusTransition = 0;
                    updateInfoPanel(sun);
                    controls.autoRotate = false;
                    hintEl.style.opacity = '0';
                    break;
            }
        });

        // Speed slider
        let globalSpeed = 1.0;
        speedSlider.addEventListener('input', () => {
            globalSpeed = speedSlider.value / 100;
            speedValueEl.textContent = globalSpeed.toFixed(1) + '×';
        });

        // ────────────────────────────────────
        // Animation Loop
        // ────────────────────────────────────
        const clock = new THREE.Clock();

        function animate(timestamp) {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            const effectiveDt = dt * globalSpeed;

            // Update planet orbits
            planets.forEach(p => {
                p.data.angle += p.data.speed * effectiveDt * 0.8;
                p.mesh.position.x = Math.cos(p.data.angle) * p.data.orbitRadius;
                p.mesh.position.z = Math.sin(p.data.angle) * p.data.orbitRadius;
                // Self rotation
                p.mesh.rotation.y += effectiveDt * 0.5;
            });

            // Update asteroid belt rotation
            asteroidBelt.rotation.y += effectiveDt * 0.08;

            // Sun rotation
            sun.rotation.y += effectiveDt * 0.1;

            // Corona particle animation
            coronaParticles.rotation.y += effectiveDt * 0.3;
            coronaParticles.rotation.x += effectiveDt * 0.1;
            const coronaPos = coronaParticles.geometry.attributes.position;
            for (let i = 0; i < coronaCount; i++) {
                const x = coronaPos.getX(i);
                const y = coronaPos.getY(i);
                const z = coronaPos.getZ(i);
                const dist = Math.sqrt(x * x + y * y + z * z);
                const jitter = (Math.sin(timestamp * 0.004 + i * 7.3) * 0.15);
                const newDist = dist + jitter;
                const scale = newDist / dist;
                coronaPos.setXYZ(i, x * scale, y * scale, z * scale);
            }
            coronaParticles.geometry.attributes.position.needsUpdate = true;

            // Comet/anomaly animation
            cometParticles.forEach(comet => {
                comet.cooldown -= dt;
                if (comet.cooldown <= 0 && !comet.visible) {
                    comet.visible = true;
                    comet.lifeTimer = comet.maxLife;
                    comet.angle = Math.random() * Math.PI * 2;
                    comet.cooldown = 15 + Math.random() * 40;
                }
                if (comet.visible) {
                    comet.lifeTimer -= dt;
                    comet.angle += comet.speed * effectiveDt * 0.5;
                    const r = comet.orbitRadius;
                    const h = comet.height * Math.sin(comet.angle * 3 + comet.phase);
                    const x = Math.cos(comet.angle) * r;
                    const z = Math.sin(comet.angle) * r;
                    comet.mesh.position.set(x, h, z);
                    comet.mesh.visible = true;
                    comet.trail.visible = true;

                    // Update trail
                    const trailPos = comet.trailPositions;
                    for (let j = trailPos.length / 3 - 1; j > 0; j--) {
                        trailPos[j * 3] = trailPos[(j - 1) * 3];
                        trailPos[j * 3 + 1] = trailPos[(j - 1) * 3 + 1];
                        trailPos[j * 3 + 2] = trailPos[(j - 1) * 3 + 2];
                    }
                    trailPos[0] = x;
                    trailPos[1] = h;
                    trailPos[2] = z;
                    comet.trail.geometry.attributes.position.needsUpdate = true;

                    // Fade near sun
                    const distToSun = Math.sqrt(x * x + h * h + z * z);
                    const brightness = Math.min(1, Math.max(0.1, 1 - (distToSun - 5) / 30));
                    comet.mesh.material.opacity = brightness;
                    comet.trail.material.opacity = brightness * 0.6;

                    if (comet.lifeTimer <= 0) {
                        comet.visible = false;
                        comet.mesh.visible = false;
                        comet.trail.visible = false;
                        comet.cooldown = 10 + Math.random() * 35;
                    }
                }
            });

            // Focus camera on selected object
            if (focusTarget) {
                focusTransition = Math.min(1, focusTransition + dt * 1.8);
                const worldPos = new THREE.Vector3();
                focusTarget.getWorldPosition(worldPos);
                const eased = focusTransition < 1 ?
                    1 - Math.pow(1 - focusTransition, 3) :
                    1;
                controls.target.lerp(worldPos, eased * 0.15);
                const idealDistance = focusTarget.userData.isMoon ? 2.5 :
                    focusTarget.userData.isPlanet ? (focusTarget === sun ? 16 : focusTarget.userData.orbitRadius * 0.35 +
                        3) : 20;
                // Smoothly adjust
                const currentDist = camera.position.distanceTo(controls.target);
                const targetDist = idealDistance;
                const newDist = currentDist + (targetDist - currentDist) * eased * 0.08;
                const dirToCamera = camera.position.clone().sub(controls.target).normalize();
                const newCamPos = controls.target.clone().add(dirToCamera.multiplyScalar(newDist));
                camera.position.lerp(newCamPos, eased * 0.06);
            }

            controls.update();

            // Rotate starfield very slowly
            stars.rotation.y += effectiveDt * 0.012;
            stars.rotation.x += effectiveDt * 0.004;

            // Render
            composer.render();
        }

        // ────────────────────────────────────
        // Sun info data
        // ────────────────────────────────────
        sun.userData = {
            orbitRadius: 0,
            speed: 0,
            angle: 0,
            info: {
                type: 'G-Type Main-Sequence Star',
                detail: 'Our star • 4.6 billion years old',
                fact: 'Contains 99.86% of the solar system\'s mass',
            },
            isPlanet: true,
        };
        allClickableObjects.push(sun);

        // ────────────────────────────────────
        // Start
        // ────────────────────────────────────
        updateInfoPanel(null);
        infoPanel.classList.add('hidden');
        requestAnimationFrame(animate);

        console.log('🌌 Solar System ready!');
        console.log('  🖱  Drag to rotate  |  Scroll to zoom  |  Click a planet to focus');
        console.log('  ⌨  Press R to reset  |  Press 0 for Sun  |  Esc to deselect');
        console.log('  🌟 All 8 planets • Moons • Asteroid belt • Comets • Bloom effects');
    </script>
</body>
</html>
