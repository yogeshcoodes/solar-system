<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System – Cinematic Slideshow</title>
    <style>
        :root {
            --bg: #000008;
            --panel-bg: rgba(8, 8, 28, 0.88);
            --text: #c8d6f8;
            --accent: #7aa2f7;
            --glow: rgba(120, 160, 255, 0.45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            scrollbar-gutter: stable;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        body {
            background: var(--bg);
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: grab;
        }

        body:active {
            cursor: grabbing;
        }

        body.pointer-cursor {
            cursor: pointer;
        }

        body.pointer-cursor:active {
            cursor: pointer;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        canvas {
            display: block;
        }

        #fade-overlay {
            position: fixed;
            inset: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: none;
        }

        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            pointer-events: none;
        }

        #top-bar>* {
            pointer-events: auto;
        }

        .ui-group {
            display: flex;
            gap: 8px;
            align-items: center;
            position: relative;
        }

        .ui-btn {
            background: var(--panel-bg);
            padding: 9px 16px;
            border-radius: 30px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s;
            text-shadow: 0 0 10px var(--glow);
        }

        .ui-btn:hover {
            background: rgba(20, 20, 45, 0.9);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px var(--glow);
        }

        .ui-btn .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #ffb84d;
            box-shadow: 0 0 14px #ffb84d, 0 0 28px #ff8c00;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                box-shadow: 0 0 14px #ffb84d, 0 0 28px #ff8c00;
            }

            50% {
                box-shadow: 0 0 24px #ffd080, 0 0 48px #ffa500;
            }
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 6px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 16px;
            padding: 8px 0;
            min-width: 180px;
            max-height: 70vh;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            z-index: 120;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
        }

        .dropdown-menu.open {
            display: flex;
        }

        .dropdown-section-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: rgba(200, 200, 240, 0.55);
            padding: 6px 18px 2px;
            pointer-events: none;
            font-weight: 600;
        }

        .dropdown-item {
            background: transparent;
            border: none;
            color: #c8d6f8;
            padding: 8px 18px;
            text-align: left;
            font-size: 0.82rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            text-shadow: 0 0 8px var(--glow);
        }

        .dropdown-item.active {
            color: #ffb84d;
            font-weight: 600;
        }

        .dropdown-item .item-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffb84d;
            flex-shrink: 0;
        }

        #controls-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        #speed-control,
        #pause-btn,
        #slideshow-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--panel-bg);
            padding: 7px 14px;
            border-radius: 30px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        #speed-control label {
            color: #bcc8e8;
            font-size: 0.78rem;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        #speed-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            cursor: pointer;
        }

        #speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--accent);
            cursor: pointer;
            box-shadow: 0 0 14px var(--glow);
        }

        #speed-value {
            color: #fff;
            font-weight: 600;
            font-size: 0.82rem;
            min-width: 36px;
            text-align: center;
        }

        #pause-btn,
        #slideshow-btn {
            cursor: pointer;
            color: #fff;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all 0.25s;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        #pause-btn:hover,
        #slideshow-btn:hover {
            background: rgba(30, 30, 60, 0.9);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 0 18px var(--glow);
        }

        #pause-btn.paused {
            background: rgba(255, 140, 30, 0.25);
            border-color: rgba(255, 160, 60, 0.5);
        }

        #slideshow-btn.active {
            background: rgba(60, 180, 120, 0.3);
            border-color: rgba(100, 220, 150, 0.6);
            box-shadow: 0 0 22px rgba(100, 255, 150, 0.4);
        }

        #info-panel {
            position: fixed;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: var(--panel-bg);
            padding: 13px 20px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: var(--text);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            pointer-events: auto;
            min-width: 190px;
            max-width: 90vw;
        }

        #info-panel.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }

        #info-panel .planet-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.04em;
            margin-bottom: 2px;
        }

        #info-panel .planet-detail {
            font-size: 0.76rem;
            color: #a0b4d8;
            letter-spacing: 0.02em;
        }

        #info-panel .planet-fact {
            font-size: 0.68rem;
            color: #8898c0;
            margin-top: 3px;
            font-style: italic;
        }

        #hint {
            position: fixed;
            bottom: 115px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(200, 210, 240, 0.65);
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            pointer-events: none;
            transition: opacity 0.6s;
            text-align: center;
            line-height: 1.5;
        }

        #legend {
            position: fixed;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 3px;
            pointer-events: none;
        }

        #legend span {
            font-size: 0.6rem;
            color: rgba(180, 195, 220, 0.7);
            letter-spacing: 0.03em;
            text-align: right;
            transition: color 0.3s;
        }

        #legend span.highlight {
            color: #fff;
            text-shadow: 0 0 8px var(--glow);
        }

        #size-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 199;
            display: none;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        #size-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 16px;
            padding: 20px;
            z-index: 200;
            display: none;
            width: 300px;
            max-width: 90vw;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            color: #fff;
        }

        #size-range {
            -webkit-appearance: none;
            width: 100%;
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            cursor: pointer;
        }

        #size-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--accent);
            cursor: pointer;
            box-shadow: 0 0 10px var(--glow);
        }

        @media (max-width:768px) {
            #top-bar {
                padding: 8px 10px;
                gap: 6px;
                justify-content: center;
            }

            .ui-btn {
                font-size: 0.9rem;
                padding: 7px 12px;
            }

            #speed-slider {
                width: 55px;
            }

            #info-panel {
                bottom: 14px;
                padding: 9px 14px;
                border-radius: 16px;
            }

            #info-panel .planet-name {
                font-size: 1.05rem;
            }

            #hint {
                bottom: 88px;
                font-size: 0.6rem;
            }

            #legend {
                right: 4px;
                gap: 1px;
            }

            #legend span {
                font-size: 0.5rem;
            }
        }

        @media (max-width:480px) {
            .ui-btn {
                font-size: 0.8rem;
                padding: 5px 9px;
                gap: 4px;
            }

            .ui-btn .dot {
                width: 6px;
                height: 6px;
            }

            #speed-slider {
                width: 40px;
            }

            #info-panel {
                bottom: 8px;
                padding: 7px 11px;
                border-radius: 12px;
                min-width: 130px;
            }

            #legend {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>
    <div id="fade-overlay"></div>

    <div id="size-modal-overlay"></div>
    <div id="size-modal">
        <div style="font-weight:600; margin-bottom:12px; font-size:1.1rem; color:#fff;" id="size-modal-title">Adjust
            Size</div>
        <div style="display:flex; align-items:center; gap:10px;">
            <input type="range" id="size-range" min="0.1" max="10" step="0.1" value="1" style="flex:1;">
            <span id="size-value-display" style="min-width:35px;font-size:0.9rem;text-align:right;">1.0x</span>
        </div>
        <div style="text-align:right; margin-top:16px;">
            <button id="size-reset-btn" class="ui-btn"
                style="padding:6px 12px; font-size:0.85rem; display:inline-block; margin-right:8px; background:rgba(200,50,50,0.3); border-color:rgba(255,100,100,0.5);">Reset</button>
            <button id="size-close-btn" class="ui-btn"
                style="padding:6px 12px; font-size:0.85rem; display:inline-block;">Done</button>
        </div>
    </div>

    <div id="top-bar">
        <div class="ui-group">
            <button id="nav-btn" class="ui-btn"><span class="dot"></span> Navigate</button>
            <div id="planet-dropdown" class="dropdown-menu"></div>

            <button id="game-btn" class="ui-btn">
                <span class="dot" style="background:#4ade80; box-shadow:0 0 14px #4ade80;"></span> Flight
            </button>
            <button id="settings-btn" class="ui-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
                Quality
            </button>
            <div id="settings-dropdown" class="dropdown-menu">
                <div class="dropdown-section-title">Graphics Quality</div>
                <button class="dropdown-item quality-btn" data-quality="low">Low</button>
                <button class="dropdown-item quality-btn" data-quality="med">Medium</button>
                <button class="dropdown-item quality-btn active" data-quality="high">High</button>

                <div class="dropdown-section-title" style="margin-top: 8px;">Anti-Aliasing</div>
                <button class="dropdown-item aa-btn" data-aa="0">Off</button>
                <button class="dropdown-item aa-btn" data-aa="2">2x MSAA</button>
                <button class="dropdown-item aa-btn active" data-aa="4">4x MSAA</button>
            </div>
        </div>
        <div id="controls-row">
            <div id="speed-control">
                <label for="speed-slider"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" style="vertical-align:text-bottom;margin-right:4px">
                        <circle cx="12" cy="14" r="8" />
                        <path d="M12 2v4" />
                        <path d="M12 14 15 11" />
                    </svg> Speed</label>
                <input type="range" id="speed-slider" min="0" max="100" value="10" step="1">
                <span id="speed-value">0.10×</span>
            </div>
            <button id="pause-btn" title="Pause / Play (Space)">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3" />
                </svg>
            </button>
            <button id="slideshow-btn" title="Cinematic Tour (T)">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m16 13 5.223 3.482a.5.5 0 0 0 .777-.416V7.87a.5.5 0 0 0-.752-.432L16 10.5" />
                    <rect x="2" y="6" width="14" height="12" rx="2" />
                </svg>
            </button>
        </div>
    </div>
    <div id="info-panel" class="hidden">
        <div class="planet-name"></div>
        <div class="planet-detail"></div>
        <div class="planet-fact"></div>
    </div>
    <div id="hint"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="vertical-align:text-bottom;margin-right:2px">
            <rect x="5" y="2" width="14" height="20" rx="7" />
            <path d="M12 2v8" />
        </svg> Drag to rotate · Scroll to zoom · Click to focus · Keys 0-9 · T for tour<br><span
            style="color:#ffb84d;">Long-press any planet in Navigate to adjust size!</span></div>
    <div id="legend"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
        import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
        import { SpaceGame } from './game.js';


        const container = document.getElementById('canvas-container');
        const fadeOverlay = document.getElementById('fade-overlay');
        const infoPanel = document.getElementById('info-panel');
        const planetNameEl = infoPanel.querySelector('.planet-name');
        const planetDetailEl = infoPanel.querySelector('.planet-detail');
        const planetFactEl = infoPanel.querySelector('.planet-fact');
        const hintEl = document.getElementById('hint');
        const legendEl = document.getElementById('legend');
        const speedSlider = document.getElementById('speed-slider');
        const speedValueEl = document.getElementById('speed-value');
        const pauseBtn = document.getElementById('pause-btn');
        const slideshowBtn = document.getElementById('slideshow-btn');

        const sizeModal = document.getElementById('size-modal');
        const sizeModalOverlay = document.getElementById('size-modal-overlay');
        const sizeRange = document.getElementById('size-range');
        const sizeValueDisplay = document.getElementById('size-value-display');
        const sizeModalTitle = document.getElementById('size-modal-title');
        const sizeCloseBtn = document.getElementById('size-close-btn');
        const sizeResetBtn = document.getElementById('size-reset-btn');
        let currentSizeObj = null;

        const bgAudio = new Audio('space.mp3');
        bgAudio.loop = true; bgAudio.volume = 0.4;
        let audioStarted = false;
        function tryStartAudio() {
            if (!audioStarted) {
                bgAudio.play().then(() => {
                    audioStarted = true;
                    document.removeEventListener('click', tryStartAudio);
                    document.removeEventListener('touchstart', tryStartAudio);
                }).catch(() => {
                    document.addEventListener('click', tryStartAudio, { once: true });
                    document.addEventListener('touchstart', tryStartAudio, { once: true });
                });
            }
        }

        tryStartAudio();

        const clickInAudio = new Audio('assets/click-in.wav');
        document.body.addEventListener('mousedown', (e) => {
            if ((e.target.closest('.ui-btn') || e.target.closest('.dropdown-item')) && !e.target.closest('.game-ctrl')) {
                clickInAudio.currentTime = 0; clickInAudio.play().catch(() => { });
            }
        });

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(48, container.clientWidth / container.clientHeight, 0.4, 700);
        camera.position.set(30, 45, 55); camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: false });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.05;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        const renderTarget = new THREE.WebGLRenderTarget(container.clientWidth, container.clientHeight, {
            type: THREE.HalfFloatType,
            samples: 4
        });

        const composer = new EffectComposer(renderer, renderTarget);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(new THREE.Vector2(container.clientWidth, container.clientHeight), 0.25, 0.4, 0.85);
        composer.addPass(bloomPass);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.07;
        controls.minDistance = 1.8; controls.maxDistance = 500;
        controls.maxPolarAngle = Math.PI * 0.84;
        controls.target.set(0, 0, 0); controls.update();
        controls.autoRotate = true; controls.autoRotateSpeed = 0.12;
        controls.enabled = true;

        const sunLight = new THREE.PointLight(0xfff8e7, 300, 500, 1.2);
        sunLight.position.set(0, 0, 0);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 2.0;
        sunLight.shadow.camera.far = 250;
        sunLight.shadow.bias = -0.002;
        sunLight.shadow.normalBias = 0.05;
        scene.add(sunLight);

        scene.add(new THREE.AmbientLight(0xffffff, 0.12));
        const fillLight = new THREE.PointLight(0x334466, 18, 120, 2);
        fillLight.position.set(0, 35, -45); scene.add(fillLight);

        const dropdown = document.getElementById('planet-dropdown');
        const settingsDropdown = document.getElementById('settings-dropdown');
        document.getElementById('nav-btn').addEventListener('click', (e) => {
            e.stopPropagation(); settingsDropdown.classList.remove('open'); dropdown.classList.toggle('open');
        });
        document.getElementById('settings-btn').addEventListener('click', (e) => {
            e.stopPropagation(); dropdown.classList.remove('open'); settingsDropdown.classList.toggle('open');
        });

                const size = new THREE.Vector3(); box.getSize(size);
                const maxDim = Math.max(size.x, size.y, size.z);

                if (maxDim > 0) {
                    const scale = (targetRadius * 2) / maxDim;
                    model.scale.setScalar(scale);
                }

                box.setFromObject(model);
                const center = new THREE.Vector3(); box.getCenter(center);
                model.position.sub(center);

                model.traverse((child) => {
                    if (child.isMesh) {
                        if (isSun) {
                            child.castShadow = false; child.receiveShadow = false;
                            let map = null;
                            forEachMaterial(child.material, (m) => { map = map || m.map || m.emissiveMap || null; });
                            child.material = new THREE.MeshBasicMaterial({ map: map || fallbackTexture, color: 0xffffff });
                        } else {
                            child.castShadow = true; child.receiveShadow = true;
                            forEachMaterial(child.material, (m) => {
                                m.metalness = 0.0;
                                m.roughness = Math.max(0.7, m.roughness || 0.5);
                                if (!m.map && fallbackTexture) {
                                    m.map = fallbackTexture;
                                    m.color.setHex(0xffffff);
                                }
                                m.needsUpdate = true;
                            });
                        }
                    }
                });

                mesh.material = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false, depthTest: false });

            }, undefined, (error) => {

                    mesh.material = new THREE.MeshBasicMaterial({ map: fallbackTexture || null, color: 0xffffff });

                        color: fallbackTexture ? 0xffffff : 0xaaaaaa,
                        roughness: 0.8,
                        metalness: 0.1

                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                }
            });
        }

        function getSceneCameraTarget(sceneDef, timeInScene) {
            const worldPos = new THREE.Vector3();
            if (sceneDef.targetObj.isMesh || sceneDef.targetObj.isPoints) sceneDef.targetObj.getWorldPosition(worldPos);
            else if (sceneDef.targetObj.position) worldPos.copy(sceneDef.targetObj.position);

            // Calculate angle relative to the Sun to ensure we always view the lit face
            let baseAzimuth = 0;
            if (worldPos.lengthSq() > 0.1 && sceneDef.targetObj.name !== 'Sun') {
                baseAzimuth = Math.atan2(worldPos.z, worldPos.x);
            }

            const orbitAngle = sceneDef.duration > 0 ? (timeInScene / sceneDef.duration) * Math.PI * 0.4 : 0;
            // Adding Math.PI offsets the camera to the sun-ward side of the planet
            const finalAzimuth = baseAzimuth + Math.PI + sceneDef.azimuth + orbitAngle;

            const camDir = new THREE.Vector3(
                Math.cos(finalAzimuth) * Math.cos(sceneDef.elevation),
                Math.sin(sceneDef.elevation),
                Math.sin(finalAzimuth) * Math.cos(sceneDef.elevation)
            );

            // Offset the look-at target slightly DOWN so the planet appears HIGHER on the screen (clearing the UI)
            const lookTarget = worldPos.clone();

                    c.lifeTimer -= rawDt; c.angle += c.speed * effDt * 0.5; const r = c.orbitRadius, h = c.height * Math.sin(c.angle * 3 + c.phase), x = Math.cos(c.angle) * r, z = Math.sin(c.angle) * r;
                    c.mesh.position.set(x, h, z); c.mesh.visible = c.trail.visible = true;
                    const tp = c.trailPositions; for (let j = c.trailLength - 1; j > 0; j--) { tp[j * 3] = tp[(j - 1) * 3]; tp[j * 3 + 1] = tp[(j - 1) * 3 + 1]; tp[j * 3 + 2] = tp[(j - 1) * 3 + 2]; } tp[0] = x; tp[1] = h; tp[2] = z; c.trail.geometry.attributes.position.needsUpdate = true;
                    const d2 = Math.sqrt(x * x + h * h + z * z), br = Math.min(1, Math.max(0.08, 1 - (d2 - 5) / 35)); c.mesh.material.opacity = br; c.trail.material.opacity = br * 0.55;
                    if (c.lifeTimer <= 0) { c.visible = false; c.mesh.visible = c.trail.visible = false; c.cooldown = 8 + Math.random() * 40; c.orbitRadius = 50 + Math.random() * 130; }
                }
            });

            if (spaceGame.isActive) {
                spaceGame.update(rawDt);
            } else if (slideshowActive && currentScene) {

                if (fadePhase === 'fadeOut') {
                    const t = Math.min((now - fadeStartTime) / fadeDuration, 1.0); fadeOverlay.style.opacity = t;
                    if (t >= 1.0) {
                        fadePhase = 'black';
                        const camTarget = getSceneCameraTarget(currentScene, 0);
                        camera.position.copy(camTarget.position); controls.target.copy(camTarget.lookAt); controls.update();
                        if (currentScene.targetObj.userData?.info) updateInfoPanel(currentScene.targetObj);
                        else { planetNameEl.textContent = currentScene.note || ''; planetDetailEl.textContent = ''; planetFactEl.innerHTML = ''; infoPanel.classList.remove('hidden'); }
                        fadeStartTime = now + 0.2; fadePhase = 'fadeIn';
                    }
                } else if (fadePhase === 'black') {
                    if (now >= fadeStartTime) { fadePhase = 'fadeIn'; fadeStartTime = now; }
                } else if (fadePhase === 'fadeIn') {
                    const t = Math.min((now - fadeStartTime) / fadeDuration, 1.0); fadeOverlay.style.opacity = 1 - t;
                    if (t >= 1.0) { fadePhase = 'idle'; sceneStartTime = now; }
                } else if (fadePhase === 'idle') {
                    const elapsedInScene = now - sceneStartTime;
                    if (elapsedInScene >= currentScene.duration) {
                        currentSceneIndex = (currentSceneIndex + 1) % scenes.length; currentScene = scenes[currentSceneIndex];
                        fadePhase = 'fadeOut'; fadeStartTime = now; fadeOverlay.style.opacity = '0';
                    } else {
                        const camTarget = getSceneCameraTarget(currentScene, elapsedInScene);
                        camera.position.lerp(camTarget.position, 0.05); controls.target.lerp(camTarget.lookAt, 0.05); controls.update();
                    }
                }
            } else {
                if (focusTarget) {
                    const currentPlanetPos = new THREE.Vector3();
                    focusTarget.getWorldPosition(currentPlanetPos);

                    if (focusTransition < 1) {
                        focusTransition += rawDt * 1.2;
                        const t = Math.min(1, focusTransition);
                        const eased = 1 - Math.pow(1 - t, 3);

                        const idealDist = focusTarget.userData.isMoon ? 2.2 : focusTarget.name === 'Sun' ? 15 : focusTarget.userData.isPlanet ? (focusTarget.userData.orbitRadius * 0.32 + 3.5) : 20;

                        let dir = focusStartCamPos.clone().sub(focusStartTarget);
                        if (dir.lengthSq() < 0.001) dir.set(0, 0, 1);
                        dir.normalize();

                        const idealCamPos = currentPlanetPos.clone().add(dir.multiplyScalar(idealDist));

                        controls.target.lerpVectors(focusStartTarget, currentPlanetPos, eased);
                        camera.position.lerpVectors(focusStartCamPos, idealCamPos, eased);
                    } else {
                        const delta = currentPlanetPos.clone().sub(lastPlanetPos);
                        controls.target.add(delta);
                        camera.position.add(delta);
                    }
                    lastPlanetPos.copy(currentPlanetPos);
                }
                controls.update();
            }

            composer.render();
        }

        updateInfoPanel(null); infoPanel.classList.add('hidden'); updateLegend(null);
        populateDropdown();
        requestAnimationFrame(animate);
    </script>
</body>
