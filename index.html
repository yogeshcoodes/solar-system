<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System – Refined Realism</title>
    <style>
        :root {
            --bg: #000008;
            --panel-bg: rgba(8, 8, 28, 0.88);
            --text: #c8d6f8;
            --accent: #7aa2f7;
            --gold: #e0b870;
            --glow: rgba(120, 160, 255, 0.45);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: grab;
        }
        body:active {
            cursor: grabbing;
        }
        body.pointer-cursor {
            cursor: pointer;
        }
        body.pointer-cursor:active {
            cursor: pointer;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        canvas {
            display: block;
        }

        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
            flex-wrap: wrap;
            gap: 8px;
        }
        #top-bar>* {
            pointer-events: auto;
        }

        /* Planet navigation button & dropdown */
        #nav-container {
            position: relative;
        }
        #nav-btn {
            background: var(--panel-bg);
            padding: 9px 16px;
            border-radius: 30px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s;
            text-shadow: 0 0 10px var(--glow);
        }
        #nav-btn:hover {
            background: rgba(20, 20, 45, 0.9);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px var(--glow);
        }
        #nav-btn .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #ffb84d;
            box-shadow: 0 0 14px #ffb84d, 0 0 28px #ff8c00;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 14px #ffb84d, 0 0 28px #ff8c00; }
            50% { box-shadow: 0 0 24px #ffd080, 0 0 48px #ffa500; }
        }

        #planet-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 6px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 16px;
            padding: 8px 0;
            min-width: 180px;
            display: none;
            flex-direction: column;
            z-index: 20;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }
        #planet-dropdown.open {
            display: flex;
        }
        .dropdown-item {
            background: transparent;
            border: none;
            color: #c8d6f8;
            padding: 8px 18px;
            text-align: left;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dropdown-item:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
            text-shadow: 0 0 8px var(--glow);
        }
        .dropdown-item .item-icon {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffb84d;
        }

        #controls-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        #speed-control,
        #pause-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--panel-bg);
            padding: 7px 14px;
            border-radius: 30px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        #speed-control label {
            color: #bcc8e8;
            font-size: 0.78rem;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }
        #speed-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            cursor: pointer;
        }
        #speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--accent);
            cursor: pointer;
            box-shadow: 0 0 14px var(--glow);
        }
        #speed-value {
            color: #fff;
            font-weight: 600;
            font-size: 0.82rem;
            min-width: 28px;
            text-align: center;
        }
        #pause-btn {
            cursor: pointer;
            color: #fff;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all 0.25s;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        #pause-btn:hover {
            background: rgba(30, 30, 60, 0.9);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 0 18px var(--glow);
        }
        #pause-btn.paused {
            background: rgba(255, 140, 30, 0.25);
            border-color: rgba(255, 160, 60, 0.5);
        }

        #info-panel {
            position: fixed;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: var(--panel-bg);
            padding: 13px 20px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: var(--text);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            pointer-events: auto;
            min-width: 190px;
            max-width: 90vw;
        }
        #info-panel.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }
        #info-panel .planet-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.04em;
            margin-bottom: 2px;
        }
        #info-panel .planet-detail {
            font-size: 0.76rem;
            color: #a0b4d8;
            letter-spacing: 0.02em;
        }
        #info-panel .planet-fact {
            font-size: 0.68rem;
            color: #8898c0;
            margin-top: 3px;
            font-style: italic;
        }

        #hint {
            position: fixed;
            bottom: 115px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(200, 210, 240, 0.65);
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            pointer-events: none;
            transition: opacity 0.6s;
            text-align: center;
            line-height: 1.5;
        }

        #legend {
            position: fixed;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 3px;
            pointer-events: none;
        }
        #legend span {
            font-size: 0.6rem;
            color: rgba(180, 195, 220, 0.7);
            letter-spacing: 0.03em;
            text-align: right;
            transition: color 0.3s;
        }
        #legend span.highlight {
            color: #fff;
            text-shadow: 0 0 8px var(--glow);
        }

        @media (max-width: 768px) {
            #top-bar {
                padding: 8px 10px;
                gap: 6px;
                justify-content: center;
            }
            #nav-btn {
                font-size: 0.9rem;
                padding: 7px 12px;
            }
            #speed-slider {
                width: 55px;
            }
            #info-panel {
                bottom: 14px;
                padding: 9px 14px;
                border-radius: 16px;
            }
            #info-panel .planet-name {
                font-size: 1.05rem;
            }
            #hint {
                bottom: 88px;
                font-size: 0.6rem;
            }
            #legend {
                right: 4px;
                gap: 1px;
            }
            #legend span {
                font-size: 0.5rem;
            }
        }
        @media (max-width: 480px) {
            #nav-btn {
                font-size: 0.8rem;
                padding: 5px 9px;
                gap: 4px;
            }
            #nav-btn .dot {
                width: 6px;
                height: 6px;
            }
            #speed-slider {
                width: 40px;
            }
            #info-panel {
                bottom: 8px;
                padding: 7px 11px;
                border-radius: 12px;
                min-width: 130px;
            }
            #legend {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="top-bar">
        <div id="nav-container">
            <button id="nav-btn">
                <span class="dot"></span> Navigate
            </button>
            <div id="planet-dropdown"></div>
        </div>
        <div id="controls-row">
            <div id="speed-control">
                <label for="speed-slider">⏱ Speed</label>
                <input type="range" id="speed-slider" min="0" max="300" value="100" step="1">
                <span id="speed-value">1×</span>
            </div>
            <button id="pause-btn" title="Pause / Play (Space)">▶</button>
        </div>
    </div>

    <div id="info-panel" class="hidden">
        <div class="planet-name"></div>
        <div class="planet-detail"></div>
        <div class="planet-fact"></div>
    </div>
    <div id="hint">🖱 Drag to rotate &bull; Scroll to zoom &bull; Click to focus &bull; Keys 0-9 &bull; Space to pause</div>
    <div id="legend"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // DOM Elements
        const container = document.getElementById('canvas-container');
        const infoPanel = document.getElementById('info-panel');
        const planetNameEl = infoPanel.querySelector('.planet-name');
        const planetDetailEl = infoPanel.querySelector('.planet-detail');
        const planetFactEl = infoPanel.querySelector('.planet-fact');
        const hintEl = document.getElementById('hint');
        const legendEl = document.getElementById('legend');
        const speedSlider = document.getElementById('speed-slider');
        const speedValueEl = document.getElementById('speed-value');
        const pauseBtn = document.getElementById('pause-btn');
        const navBtn = document.getElementById('nav-btn');
        const dropdown = document.getElementById('planet-dropdown');

        // Scene, Camera, Renderer
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(48, container.clientWidth / container.clientHeight, 0.4, 700);
        camera.position.set(16, 26, 36);
        camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.05;
        container.appendChild(renderer.domElement);

        // Post-Processing (Bloom reduced by 10% from previous 0.75)
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(container.clientWidth, container.clientHeight),
            0.675,  // reduced by 10% from 0.75
            0.45,
            0.62
        );
        composer.addPass(bloomPass);

        // OrbitControls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.07;
        controls.minDistance = 2.5;
        controls.maxDistance = 180;
        controls.maxPolarAngle = Math.PI * 0.84;
        controls.target.set(0, 0, 0);
        controls.update();
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.12;

        // Lighting
        const sunLight = new THREE.PointLight(0xfff8e7, 200, 250, 1.5);
        sunLight.position.set(0, 0, 0);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.2;
        sunLight.shadow.camera.far = 250;
        sunLight.shadow.bias = -0.00008;
        sunLight.shadow.normalBias = 0.02;
        scene.add(sunLight);
        const ambientLight = new THREE.AmbientLight(0x0a0a22, 0.28);
        scene.add(ambientLight);
        const fillLight = new THREE.PointLight(0x334466, 18, 120, 2);
        fillLight.position.set(0, 35, -45);
        scene.add(fillLight);

        // Helper: procedural texture
        function createCanvasTexture(width, height, drawFn) {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            drawFn(ctx, width, height);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.minFilter = THREE.LinearMipmapLinearFilter;
            texture.magFilter = THREE.LinearFilter;
            texture.generateMipmaps = true;
            return texture;
        }

        function seededRandom(seed) {
            let s = seed || 1;
            return function () {
                s = (s * 16807 + 1) % 2147483647;
                return (s - 1) / 2147483646;
            };
        }

        // Planet textures (unchanged)
        function drawSunTexture(ctx, w, h) {
            const rand = seededRandom(42);
            const grad = ctx.createRadialGradient(w/2, h/2, w*0.03, w/2, h/2, w*0.72);
            grad.addColorStop(0,'#fffef5'); grad.addColorStop(0.15,'#ffe89a'); grad.addColorStop(0.4,'#ffb840'); grad.addColorStop(0.65,'#f07018'); grad.addColorStop(0.85,'#c04008'); grad.addColorStop(1,'#802000');
            ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
            for(let i=0;i<50;i++){ const sx=w*(0.12+rand()*0.76),sy=h*(0.12+rand()*0.76),sr=w*(0.008+rand()*0.055); const sg=ctx.createRadialGradient(sx,sy,sr*0.05,sx,sy,sr); sg.addColorStop(0,'rgba(100,20,0,0.75)'); sg.addColorStop(0.5,'rgba(170,50,8,0.35)'); sg.addColorStop(1,'rgba(255,140,30,0)'); ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill(); }
            for(let i=0;i<100;i++){ const gx=w*(0.08+rand()*0.84),gy=h*(0.08+rand()*0.84),gr=w*(0.004+rand()*0.022); ctx.fillStyle=`rgba(255,255,225,${0.12+rand()*0.4})`; ctx.beginPath(); ctx.arc(gx,gy,gr,0,Math.PI*2); ctx.fill(); }
        }
        function drawMercuryTexture(ctx,w,h){ const rand=seededRandom(101); ctx.fillStyle='#909090'; ctx.fillRect(0,0,w,h); for(let i=0;i<250;i++){ const cx=w*rand(),cy=h*rand(),cr=w*(0.008+rand()*0.07),s=80+rand()*70; ctx.fillStyle=`rgb(${s},${s},${s})`; ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.fill(); } for(let i=0;i<50;i++){ const cx=w*rand(),cy=h*rand(),cr=w*(0.015+rand()*0.09); const rg=ctx.createRadialGradient(cx,cy,cr*0.65,cx,cy,cr); rg.addColorStop(0,'#555'); rg.addColorStop(0.75,'#999'); rg.addColorStop(1,'#b5b5b5'); ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.fill(); } }
        function drawVenusTexture(ctx,w,h){ const rand=seededRandom(202); const grad=ctx.createLinearGradient(0,0,0,h); grad.addColorStop(0,'#ead8a8'); grad.addColorStop(0.3,'#deca96'); grad.addColorStop(0.5,'#e8d4a4'); grad.addColorStop(0.7,'#d6bc84'); grad.addColorStop(1,'#e2cc94'); ctx.fillStyle=grad; ctx.fillRect(0,0,w,h); for(let i=0;i<40;i++){ const sx=w*rand(),sy=h*rand(),sw=w*(0.04+rand()*0.28),sh=h*(0.015+rand()*0.07); ctx.fillStyle=`rgba(255,248,230,${0.06+rand()*0.22})`; ctx.beginPath(); ctx.ellipse(sx,sy,sw,sh,rand()*Math.PI,0,Math.PI*2); ctx.fill(); } }
        function drawEarthTexture(ctx,w,h){ const rand=seededRandom(303); const og=ctx.createRadialGradient(w*0.3,h*0.4,w*0.08,w/2,h/2,w*0.82); og.addColorStop(0,'#3a90d8'); og.addColorStop(0.45,'#2470b8'); og.addColorStop(1,'#0e3a70'); ctx.fillStyle=og; ctx.fillRect(0,0,w,h); const cont=[ {cx:0.24,cy:0.34,rx:0.19,ry:0.23,rot:0.2,color:'#5da040'},{cx:0.3,cy:0.28,rx:0.13,ry:0.17,rot:-0.3,color:'#6cb44e'},{cx:0.5,cy:0.4,rx:0.21,ry:0.26,rot:0.5,color:'#4c9430'},{cx:0.56,cy:0.34,rx:0.16,ry:0.19,rot:-0.1,color:'#7cc460'},{cx:0.7,cy:0.44,rx:0.15,ry:0.21,rot:0.6,color:'#5da040'},{cx:0.34,cy:0.56,rx:0.11,ry:0.13,rot:-0.4,color:'#6cb44e'},{cx:0.6,cy:0.6,rx:0.17,ry:0.15,rot:0.3,color:'#4c9430'},{cx:0.8,cy:0.3,rx:0.09,ry:0.11,rot:-0.2,color:'#5da040'},{cx:0.14,cy:0.5,rx:0.1,ry:0.14,rot:0.7,color:'#6cb44e'},{cx:0.46,cy:0.5,rx:0.12,ry:0.1,rot:-0.5,color:'#7cc460'} ]; cont.forEach(c=>{ ctx.save(); ctx.translate(c.cx*w,c.cy*h); ctx.rotate(c.rot); ctx.fillStyle=c.color; ctx.beginPath(); ctx.ellipse(0,0,c.rx*w,c.ry*h,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.beginPath(); ctx.ellipse(0.02*w,-0.02*h,c.rx*w*0.55,c.ry*h*0.45,0.3,0,Math.PI*2); ctx.fill(); ctx.restore(); }); for(let i=0;i<70;i++){ const cx=w*rand(),cy=h*rand(); ctx.fillStyle=`rgba(255,255,255,${0.02+rand()*0.13})`; ctx.beginPath(); ctx.ellipse(cx,cy,w*(0.015+rand()*0.09),h*(0.008+rand()*0.035),rand()*Math.PI,0,Math.PI*2); ctx.fill(); } ctx.fillStyle='rgba(240,245,255,0.55)'; ctx.fillRect(0,0,w,h*0.055); ctx.fillRect(0,h*0.945,w,h*0.055); }
        function drawMarsTexture(ctx,w,h){ const rand=seededRandom(404); const grad=ctx.createRadialGradient(w*0.4,h*0.35,w*0.04,w/2,h/2,w*0.78); grad.addColorStop(0,'#d89060'); grad.addColorStop(0.5,'#c45434'); grad.addColorStop(1,'#802818'); ctx.fillStyle=grad; ctx.fillRect(0,0,w,h); for(let i=0;i<100;i++){ const cx=w*rand(),cy=h*rand(),cr=w*(0.012+rand()*0.08); ctx.fillStyle=`rgba(${170+rand()*70},${35+rand()*45},${12+rand()*28},${0.18+rand()*0.45})`; ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.fill(); } ctx.fillStyle='rgba(235,228,218,0.5)'; ctx.fillRect(0,0,w,h*0.045); ctx.fillRect(0,h*0.955,w,h*0.045); }
        function drawJupiterTexture(ctx,w,h){ const rand=seededRandom(505); const bg=ctx.createLinearGradient(0,0,0,h); bg.addColorStop(0,'#d8bc9a'); bg.addColorStop(0.14,'#ecd8c0'); bg.addColorStop(0.28,'#c89860'); bg.addColorStop(0.42,'#f4e0c8'); bg.addColorStop(0.54,'#b87840'); bg.addColorStop(0.68,'#e4cca4'); bg.addColorStop(0.82,'#c89058'); bg.addColorStop(1,'#d8bc9a'); ctx.fillStyle=bg; ctx.fillRect(0,0,w,h); for(let i=0;i<70;i++){ const by=h*(0.04+rand()*0.92); ctx.fillStyle=`rgba(${170+rand()*85},${95+rand()*85},${35+rand()*55},${0.08+rand()*0.32})`; ctx.fillRect(0,by,w,h*(0.006+rand()*0.045)); } const grsX=w*0.58,grsY=h*0.44; const grsG=ctx.createRadialGradient(grsX,grsY,w*0.008,grsX,grsY,w*0.13); grsG.addColorStop(0,'#f08058'); grsG.addColorStop(0.4,'#d46444'); grsG.addColorStop(1,'rgba(200,120,80,0)'); ctx.fillStyle=grsG; ctx.beginPath(); ctx.ellipse(grsX,grsY,w*0.11,h*0.055,0.04,0,Math.PI*2); ctx.fill(); }
        function drawSaturnTexture(ctx,w,h){ const rand=seededRandom(606); const grad=ctx.createLinearGradient(0,0,0,h); grad.addColorStop(0,'#f2e4c8'); grad.addColorStop(0.2,'#ead8ac'); grad.addColorStop(0.4,'#f7ecd8'); grad.addColorStop(0.6,'#e2cc94'); grad.addColorStop(0.8,'#eedcb4'); grad.addColorStop(1,'#f2e4c8'); ctx.fillStyle=grad; ctx.fillRect(0,0,w,h); for(let i=0;i<45;i++){ const by=h*(0.04+rand()*0.92); ctx.fillStyle=`rgba(${195+rand()*60},${158+rand()*55},${95+rand()*45},${0.05+rand()*0.22})`; ctx.fillRect(0,by,w,h*(0.005+rand()*0.032)); } }

            document.querySelectorAll('.dropdown-item').forEach((btn,idx)=>{
                btn.addEventListener('click',(e)=>{
                    e.stopPropagation();
                    const target = items[idx];
                    selectedObject = target; focusTarget = target; focusTransition = 0;
                    updateInfoPanel(target); controls.autoRotate = false; hintEl.style.opacity='0';
                    dropdown.classList.remove('open');
                });
            });
        }
        navBtn.addEventListener('click',(e)=>{ e.stopPropagation(); dropdown.classList.toggle('open'); });
        document.addEventListener('click',()=>dropdown.classList.remove('open'));

        // Resize
        window.addEventListener('resize',()=>{ camera.aspect=container.clientWidth/container.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(container.clientWidth,container.clientHeight); composer.setSize(container.clientWidth,container.clientHeight); });

        // Mouse move / click
        window.addEventListener('mousemove',(e)=>{ updateMouse(e); const ints=getIntersections(); if(ints.length>0){ const obj=ints[0].object; if(obj.userData?.isPlanet||obj.userData?.isMoon){ if(hoveredObject!==obj){ hoveredObject=obj; document.body.classList.add('pointer-cursor'); if(!selectedObject)updateInfoPanel(obj); } } else { if(hoveredObject){ hoveredObject=null; document.body.classList.remove('pointer-cursor'); if(!selectedObject)clearInfoPanel(); } } } else { if(hoveredObject){ hoveredObject=null; document.body.classList.remove('pointer-cursor'); if(!selectedObject)clearInfoPanel(); } } });
        window.addEventListener('click',(e)=>{ updateMouse(e); const ints=getIntersections(); if(ints.length>0){ const obj=ints[0].object; if(obj.userData?.isPlanet||obj.userData?.isMoon){ selectedObject=obj; focusTarget=obj; focusTransition=0; updateInfoPanel(obj); controls.autoRotate=false; hintEl.style.opacity='0'; } } else { if(selectedObject){ clearInfoPanel(); controls.autoRotate=true; focusTarget=null; } } });
        window.addEventListener('touchstart',(e)=>{ if(e.touches.length===1){ const t=e.touches[0]; updateMouse({clientX:t.clientX,clientY:t.clientY}); const ints=getIntersections(); if(ints.length>0){ const obj=ints[0].object; if(obj.userData?.isPlanet||obj.userData?.isMoon){ selectedObject=obj; focusTarget=obj; focusTransition=0; updateInfoPanel(obj); controls.autoRotate=false; hintEl.style.opacity='0'; } } } });

        // Keyboard
        const keyMap={ '0':sun, '1':mercuryData.mesh, '2':venusData.mesh, '3':earthData.mesh, '4':marsData.mesh, '5':jupiterData.mesh, '6':saturnData.mesh, '7':uranusData.mesh, '8':neptuneData.mesh, '9':plutoData.mesh };
        window.addEventListener('keydown',(e)=>{
            const k=e.key.toLowerCase(); if(k===' '){ e.preventDefault(); togglePause(); return; }
            if(keyMap[k]){ const t=keyMap[k]; selectedObject=t; focusTarget=t; focusTransition=0; updateInfoPanel(t); controls.autoRotate=false; hintEl.style.opacity='0'; return; }
            if(k==='r'){ focusTarget=null; selectedObject=null; controls.target.set(0,0,0); controls.autoRotate=true; clearInfoPanel(); }
            else if(k==='escape'){ clearInfoPanel(); controls.autoRotate=true; focusTarget=null; }
        });

        let globalSpeed=1.0;
        speedSlider.addEventListener('input',()=>{ globalSpeed=speedSlider.value/100; speedValueEl.textContent=globalSpeed.toFixed(1)+'×'; });
        function togglePause(){ isPaused=!isPaused; pauseBtn.textContent=isPaused?'⏸':'▶'; pauseBtn.classList.toggle('paused',isPaused); }
        pauseBtn.addEventListener('click',togglePause);

        // Sun info
        sun.userData={ orbitRadius:0, speed:0, angle:0, info:{type:'G-Type Main-Sequence Star',detail:'Our star • 4.6 billion years old',fact:'Contains 99.86% of solar system mass'}, isPlanet:true };
        allClickableObjects.push(sun);

        // Animation
        const clock = new THREE.Clock();
        function animate(ts){
            requestAnimationFrame(animate);
            const rawDt = Math.min(clock.getDelta(),0.1);
            const dt = isPaused?0:rawDt;
            const effDt = dt*globalSpeed;

            planets.forEach(p=>{ if(effDt>0){ p.data.angle += p.data.speed*effDt*0.8; p.mesh.position.x=Math.cos(p.data.angle)*p.data.orbitRadius; p.mesh.position.z=Math.sin(p.data.angle)*p.data.orbitRadius; p.mesh.rotation.y+=effDt*0.5; } });
            moonObjects.forEach(m=>{ if(effDt>0){ m.data.angle += m.data.speed*effDt*0.8; m.pivot.rotation.y=m.data.angle; m.mesh.rotation.y+=effDt*0.6; } });
            if(effDt>0){ asteroidBelt.rotation.y+=effDt*0.07; kuiperBelt.rotation.y+=effDt*0.025; sun.rotation.y+=effDt*0.1; }

            cometParticles.forEach(c=>{
                c.cooldown-=rawDt;
                if(c.cooldown<=0 && !c.visible){ c.visible=true; c.lifeTimer=c.maxLife; c.angle=Math.random()*Math.PI*2; c.cooldown=15+Math.random()*45; for(let j=0;j<c.trailLength;j++){ c.trailPositions[j*3]=Math.cos(c.angle)*c.orbitRadius; c.trailPositions[j*3+1]=c.height*Math.sin(c.angle*3+c.phase); c.trailPositions[j*3+2]=Math.sin(c.angle)*c.orbitRadius; } }
                if(c.visible){
                    c.lifeTimer-=rawDt; c.angle+=c.speed*effDt*0.5; const r=c.orbitRadius, h=c.height*Math.sin(c.angle*3+c.phase), x=Math.cos(c.angle)*r, z=Math.sin(c.angle)*r;
                    c.mesh.position.set(x,h,z); c.mesh.visible=c.trail.visible=true;
                    const tp=c.trailPositions; for(let j=c.trailLength-1;j>0;j--){ tp[j*3]=tp[(j-1)*3]; tp[j*3+1]=tp[(j-1)*3+1]; tp[j*3+2]=tp[(j-1)*3+2]; } tp[0]=x; tp[1]=h; tp[2]=z; c.trail.geometry.attributes.position.needsUpdate=true;
                    const d2=Math.sqrt(x*x+h*h+z*z), br=Math.min(1,Math.max(0.08,1-(d2-5)/35)); c.mesh.material.opacity=br; c.trail.material.opacity=br*0.55;
                    if(c.lifeTimer<=0){ c.visible=false; c.mesh.visible=c.trail.visible=false; c.cooldown=8+Math.random()*40; }
                }
            });

            if(focusTarget){
                focusTransition=Math.min(1,focusTransition+rawDt*1.8);
                const wp=new THREE.Vector3(); focusTarget.getWorldPosition(wp);
                const eased= focusTransition<1? 1-Math.pow(1-focusTransition,3):1;
                controls.target.lerp(wp,eased*0.14);
                const idealDist = focusTarget.userData.isMoon?2.2: focusTarget===sun?15: focusTarget.userData.isPlanet?(focusTarget.userData.orbitRadius*0.32+3.5):20;
                const curDist=camera.position.distanceTo(controls.target);
                const newDist=curDist+(idealDist-curDist)*eased*0.07;
                const dir=camera.position.clone().sub(controls.target).normalize();
                camera.position.lerp(controls.target.clone().add(dir.multiplyScalar(newDist)),eased*0.055);
            }
            controls.update();
            if(effDt>0){ stars.rotation.y+=effDt*0.01; stars.rotation.x+=effDt*0.003; }
            composer.render();
        }

        updateInfoPanel(null); infoPanel.classList.add('hidden'); updateLegend(null);
        populateDropdown();
        requestAnimationFrame(animate);
        console.log('🌌 Solar System refined – Pluto visible, stars reduced, bloom reduced, navigation menu ready.');
    </script>
</body>
</html>
