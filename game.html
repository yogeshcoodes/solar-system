<!-- game.html -->

<div id="game-ui" style="display: none;">
    <div id="game-top-bar">
        <button id="game-exit-btn" class="ui-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" x2="9" y1="12" y2="12" />
            </svg>
            Exit Flight
        </button>
        <button id="game-cam-btn" class="ui-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                <circle cx="12" cy="13" r="4" />
            </svg>
            Cam: 3rd Person
        </button>
    </div>

    <div id="game-controls">
        <div class="pad pad-left">
            <button id="btn-tilt-down" class="game-ctrl">Pitch Dwn</button>
            <div class="pad-row">
                <button id="btn-turn-left" class="game-ctrl">Yaw L</button>
                <button id="btn-tilt-up" class="game-ctrl">Pitch Up</button>
                <button id="btn-turn-right" class="game-ctrl">Yaw R</button>
            </div>
        </div>

        <div class="pad pad-right">
            <button id="btn-forward" class="game-ctrl thrust">Thrust +</button>
            <div class="pad-row">
                <button id="btn-roll-left" class="game-ctrl">Roll L</button>
                <button id="btn-backward" class="game-ctrl thrust">Thrust -</button>
                <button id="btn-roll-right" class="game-ctrl">Roll R</button>
            </div>
        </div>
    </div>
</div>
